<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Dependency Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 24px; }
  h1 { font-size: 1.4rem; margin-bottom: 16px; color: #58a6ff; }
  .waves { display: flex; gap: 24px; overflow-x: auto; padding-bottom: 16px; }
  .wave { min-width: 260px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
  .wave-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #8b949e; margin-bottom: 12px; }
  .pr-card { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin-bottom: 8px; transition: border-color 0.2s; }
  .pr-card:hover { border-color: #58a6ff; }
  .pr-id { font-weight: 700; font-size: 0.9rem; color: #58a6ff; }
  .pr-title { font-size: 0.85rem; margin-top: 4px; color: #c9d1d9; }
  .pr-meta { font-size: 0.75rem; color: #8b949e; margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; }
  .badge-todo { background: #30363d; color: #8b949e; }
  .badge-in-progress { background: #1f2d1f; color: #3fb950; }
  .badge-done { background: #0c2d6b; color: #58a6ff; }
  .badge-risk-low { background: #0c2d1f; color: #3fb950; }
  .badge-risk-medium { background: #2d2200; color: #d29922; }
  .badge-risk-high { background: #3d1010; color: #f85149; }
  .deps { font-size: 0.7rem; color: #6e7681; margin-top: 4px; }
  .arrow { display: flex; align-items: center; justify-content: center; min-width: 32px; color: #30363d; font-size: 1.5rem; }
  .tasks-section { margin-top: 24px; }
  .tasks-section h2 { font-size: 1rem; color: #8b949e; margin-bottom: 8px; }
  .task { font-size: 0.85rem; padding: 4px 0; }
  .task-done { text-decoration: line-through; color: #6e7681; }
  .refresh-info { font-size: 0.7rem; color: #484f58; margin-top: 16px; }
</style>
</head>
<body>
<h1>PR Dependency Visualizer</h1>
<div id="root"></div>
<div class="refresh-info" id="refresh-info"></div>
<script>
async function loadData() {
  const res = await fetch('data.json?' + Date.now());
  return res.json();
}

function groupByWave(prs) {
  const waves = new Map();
  for (const pr of prs) {
    const w = pr.wave || 'Ungrouped';
    if (!waves.has(w)) waves.set(w, []);
    waves.get(w).push(pr);
  }
  return waves;
}

function renderBadge(cls, text) {
  return `<span class="badge badge-${cls}">${text}</span>`;
}

function render(data) {
  const root = document.getElementById('root');
  const waves = groupByWave(data.prs);
  let html = '<div class="waves">';
  let i = 0;
  for (const [waveName, prs] of waves) {
    if (i > 0) html += '<div class="arrow">&#8594;</div>';
    html += `<div class="wave"><div class="wave-title">${waveName}</div>`;
    for (const pr of prs) {
      const statusCls = pr.status.replace(/\s+/g, '-');
      const riskBadge = pr.risk ? renderBadge('risk-' + pr.risk.toLowerCase(), pr.risk + ' risk') : '';
      const deps = pr.dependsOn.length ? `<div class="deps">Depends on: ${pr.dependsOn.join(', ')}</div>` : '';
      const desc = pr.description ? `<div class="pr-meta">${pr.description}</div>` : '';
      html += `<div class="pr-card">
        <div class="pr-id">${pr.id} ${renderBadge(statusCls, pr.status)} ${riskBadge}</div>
        <div class="pr-title">${pr.title}</div>
        ${desc}${deps}
      </div>`;
    }
    html += '</div>';
    i++;
  }
  html += '</div>';

  if (data.tasks && data.tasks.length) {
    html += '<div class="tasks-section"><h2>Tasks</h2>';
    for (const t of data.tasks) {
      const cls = t.done ? 'task task-done' : 'task';
      const check = t.done ? '&#9745;' : '&#9744;';
      const link = t.linkedPr ? ` (${t.linkedPr})` : '';
      html += `<div class="${cls}">${check} ${t.title}${link}</div>`;
    }
    html += '</div>';
  }

  root.innerHTML = html;
  document.getElementById('refresh-info').textContent =
    `Auto-refreshes every ${data.refreshSeconds}s | Last updated: ${new Date().toLocaleTimeString()}`;
}

async function init() {
  const data = await loadData();
  render(data);
  setInterval(async () => { render(await loadData()); }, (data.refreshSeconds || 30) * 1000);
}
init();
</script>
</body>
</html>
